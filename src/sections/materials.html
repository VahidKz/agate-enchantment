<section class="material-philosophy" id="materials" aria-labelledby="materials-title">
  <div class="material-philosophy-heading" data-reveal>
    <p class="eyebrow">Our Materials</p>
    <h2 id="materials-title">Two forms. One philosophy.</h2>
  </div>

  <div class="material-philosophy-stage">
    <article class="material-form material-form-block" data-reveal>
      <div class="material-form-copy">
        <h3>Blocks</h3>
        <p>Raw, monumental, and selected at the source.</p>
        <a class="material-form-cta" href="#forms" aria-label="Explore Ember Vein blocks">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12h12"/>
            <path d="m13 7 5 5-5 5"/>
          </svg>
        </a>
      </div>
      <figure class="material-form-figure">
        <img
          src="/assets/block.png"
          alt="Raw natural stone block selected at the quarry"
          loading="lazy"
        />
      </figure>
    </article>

    <div class="material-philosophy-divider" aria-hidden="true">
      <span><img src="/assets/AGATE-mark.png" alt="" aria-hidden="true" /></span>
    </div>

    <article class="material-form material-form-slab" data-reveal>
      <figure class="material-form-figure">
        <img
          src="/assets/slab.png"
          alt="Refined natural stone slab for architectural spaces"
          loading="lazy"
        />
      </figure>
      <div class="material-form-copy">
        <h3>Slabs</h3>
        <p>Refined surfaces for extraordinary spaces.</p>
        <a class="material-form-cta" href="#forms" aria-label="Explore Ember Vein slabs">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M5 12h12"/>
            <path d="m13 7 5 5-5 5"/>
          </svg>
        </a>
      </div>
    </article>
  </div>

  <a class="material-philosophy-link" href="/material">
    <span>Explore Ember Vein</span>
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M5 12h12" />
      <path d="m13 7 5 5-5 5" />
    </svg>
  </a>
</section>
